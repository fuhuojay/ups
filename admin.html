<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>授权手机号管理</title>
  <style>
    :root {
      --bg: #f5f7f9;
      --panel: #ffffff;
      --line: #d8dee4;
      --text: #17202a;
      --muted: #667085;
      --brand: #0b6b5b;
      --warn: #b54708;
      --soft: #eaf4f2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .panel {
      width: min(680px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 22px;
      box-shadow: 0 8px 28px rgba(16, 24, 40, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    form {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 10px;
      margin-top: 18px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    input {
      width: 100%;
      height: 42px;
      border: 1px solid #c9d2dc;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(11, 107, 91, 0.14);
    }

    button {
      height: 42px;
      align-self: end;
      border: 0;
      border-radius: 6px;
      padding: 0 18px;
      background: var(--brand);
      color: #fff;
      font-weight: 750;
      cursor: pointer;
    }

    .result {
      display: grid;
      gap: 8px;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .ok {
      border-color: #b7dfca;
      background: var(--soft);
      color: #14532d;
    }

    .bad {
      border-color: #fed7aa;
      background: #fff7ed;
      color: #7c2d12;
    }

    .hash {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      color: #344054;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .links a {
      color: var(--brand);
      font-weight: 700;
      text-decoration: none;
    }

    @media (max-width: 560px) {
      form { grid-template-columns: 1fr; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>授权手机号管理</h1>
    <p>输入手机号后会自动写入授权名单。手机号不会明文保存，系统只保存 SHA-256 哈希。添加后刷新主页面即可验证使用完整价格功能。</p>

    <form id="authForm">
      <label>
        手机号
        <input id="phone" type="tel" inputmode="tel" autocomplete="off" placeholder="例如 13800138000">
      </label>
      <button type="submit">添加授权</button>
    </form>

    <div class="result" id="result">等待输入手机号。</div>

    <div class="links">
      <a href="/index.html" target="_blank">打开配置工具</a>
      <a href="/authorized-phones.js" target="_blank">查看授权文件</a>
    </div>
  </main>

  <script>
    const form = document.querySelector("#authForm");
    const phone = document.querySelector("#phone");
    const result = document.querySelector("#result");

    function show(message, type = "") {
      result.className = `result ${type}`;
      result.innerHTML = message;
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      const value = phone.value.trim();
      if (!value) {
        show("请输入手机号。", "bad");
        return;
      }

      show("正在添加授权...");

      try {
        const response = await fetch("/api/add-phone", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: value })
        });
        const data = await response.json();
        if (!response.ok || !data.ok) {
          show(data.message || "添加失败。", "bad");
          return;
        }
        show(`${data.added ? "已添加授权手机号" : "该手机号已在授权名单中"}：${data.phone}<br><span class="hash">${data.hash}</span>`, "ok");
        phone.value = "";
      } catch (error) {
        show("无法连接本地授权服务。请先双击“启动授权管理.command”。", "bad");
      }
    });
  </script>
</body>
</html>
